---
- name: Install i3 desktop stack
  ansible.builtin.apt:
    name: "{{ _i3_packages }}"
    state: present

- name: Install SDDM and Qt6 dependencies
  ansible.builtin.apt:
    name: "{{ _sddm_packages }}"
    state: present

- name: Clone sddm-astronaut-theme
  ansible.builtin.git:
    repo: https://github.com/Keyitdev/sddm-astronaut-theme.git
    dest: /usr/share/sddm/themes/sddm-astronaut-theme
    version: master
    force: true

- name: Deploy Lower Pixel font to theme Fonts dir
  ansible.builtin.copy:
    src: sddm/Fonts/LowresPixel-Regular.otf
    dest: /usr/share/sddm/themes/sddm-astronaut-theme/Fonts/LowresPixel-Regular.otf
    owner: root
    group: root
    mode: "0644"

- name: Deploy Lower Pixel font system-wide
  ansible.builtin.copy:
    src: sddm/Fonts/LowresPixel-Regular.otf
    dest: /usr/share/fonts/truetype/LowresPixel-Regular.otf
    owner: root
    group: root
    mode: "0644"
  notify: Update font cache

- name: Deploy pixel_sakura background image
  ansible.builtin.copy:
    src: sddm/Backgrounds/pixelart-sakura.jpg
    dest: /usr/share/sddm/themes/sddm-astronaut-theme/Backgrounds/pixelart-sakura.jpg
    owner: root
    group: root
    mode: "0644"

- name: Remove old pixel_sakura background
  ansible.builtin.file:
    path: /usr/share/sddm/themes/sddm-astronaut-theme/Backgrounds/pixel_sakura.png
    state: absent

- name: Set pixel_sakura as active theme variant in metadata.desktop
  ansible.builtin.lineinfile:
    path: /usr/share/sddm/themes/sddm-astronaut-theme/metadata.desktop
    regexp: "^ConfigFile="
    line: "ConfigFile=Themes/pixel_sakura.conf"

- name: Patch pixel_sakura.conf to use custom background
  ansible.builtin.lineinfile:
    path: /usr/share/sddm/themes/sddm-astronaut-theme/Themes/pixel_sakura.conf
    regexp: '^Background='
    line: 'Background="Backgrounds/pixel_sakura_static.png"'

- name: Patch pixel_sakura.conf font size
  ansible.builtin.lineinfile:
    path: /usr/share/sddm/themes/sddm-astronaut-theme/Themes/pixel_sakura.conf
    regexp: '^FontSize='
    line: 'FontSize="22"'

- name: Patch pixel_sakura.conf font family
  ansible.builtin.lineinfile:
    path: /usr/share/sddm/themes/sddm-astronaut-theme/Themes/pixel_sakura.conf
    regexp: '^Font='
    line: 'Font="Lower Pixel"'

- name: Remove autologin config if present
  ansible.builtin.file:
    path: /etc/sddm.conf.d/00-autologin.conf
    state: absent

- name: Set default session to i3
  ansible.builtin.copy:
    dest: /etc/sddm.conf.d/10-default-session.conf
    content: |
      [Users]
      RememberLastSession=true
      DefaultSession=i3.desktop
    owner: root
    group: root
    mode: "0644"

- name: Ensure /etc/sddm.conf.d exists
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure SDDM to use sddm-astronaut-theme
  ansible.builtin.template:
    src: sddm/sddm.conf.j2
    dest: /etc/sddm.conf.d/theme.conf
    owner: root
    group: root
    mode: "0644"

- name: Disable LightDM
  ansible.builtin.systemd:
    name: lightdm
    enabled: false
    state: stopped
  ignore_errors: true

- name: Enable and start SDDM
  ansible.builtin.systemd:
    name: sddm
    enabled: true
    state: started
