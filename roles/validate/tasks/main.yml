---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
        - default.yml
      paths: ["{{ role_path }}/vars"]
      skip: true

- name: Run OS-specific validation
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "validate_{{ ansible_distribution | lower }}.yml"
        - "validate_{{ ansible_os_family | lower }}.yml"
      paths: ["{{ role_path }}/tasks"]

- name: Run common validation
  ansible.builtin.include_tasks: validate_common.yml
