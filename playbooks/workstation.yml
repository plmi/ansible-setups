---
- name: Configure workstation base
  hosts: workstation
  become: true
  roles:
    - role: common_base
      tags: [base]
    - role: user_accounts
      tags: [user]
    - role: terminal_shell
      tags: [shell]

- name: Configure Hyprland desktop
  hosts: hyprland
  become: true
  roles:
    - role: hyprland_desktop
      tags: [hyprland]
    - role: dotfiles
      tags: [dotfiles]

- name: Configure i3 desktop
  hosts: i3
  become: true
  roles:
    - role: i3_desktop
      tags: [i3]
    - role: dotfiles
      tags: [dotfiles]
